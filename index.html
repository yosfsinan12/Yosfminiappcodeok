<!DOCTYPE html>
<html>
<head>
    <style>
        body { background-color: #fff; color: #d4af37; font-family: sans-serif; text-align: center; }
        .box { border: 2px solid #d4af37; padding: 20px; border-radius: 15px; margin: 20px; }
        input { width: 80%; padding: 10px; border: 1px solid #d4af37; }
        button { background-color: #d4af37; color: white; padding: 10px 20px; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h1>👑 Gold & White App 👑</h1>
        <p>لینکێ ڤیدیویێ (TikTok/Insta/Snap) ل ڤێرێ دانی:</p>
        <input type="text" id="url" placeholder="https://...">
        <br><br>
        <button onclick="sendData()">داونلۆدکرنا MP3</button>
    </div>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        function sendData() {
            const link = document.getElementById("url").value;
            window.Telegram.WebApp.sendData(link);
        }
    </script>
</body>
</html>
