<!DOCTYPE html>
<html>
<head>
    <style>
        body { background-color: #000; color: #d4af37; font-family: sans-serif; text-align: center; padding: 20px; }
        .box { border: 2px solid #d4af37; padding: 15px; border-radius: 10px; }
        select, input, button { width: 90%; margin: 5px; padding: 10px; background: #000; color: #d4af37; border: 1px solid #d4af37; }
        button { background: #d4af37; color: #000; font-weight: bold; }
        footer { font-size: 10px; margin-top: 20px; color: #fff; }
    </style>
</head>
<body>
    <div class="box">
        <h1>👑 SNAPTIK 👑</h1>
        <input type="text" id="url" placeholder="لینکێ ل ڤێرێ دانە">
        <select id="platform">
            <option value="tiktok">TikTok</option>
            <option value="snap">Snapchat</option>
            <option value="insta">Instagram</option>
        </select>
        <button onclick="sendData()">داونلۆد بکە</button>
        <hr>
        <button onclick="toggleRadio()">📻 رادیۆ (ستران)</button>
    </div>
    <footer>MADE BY @YUSSEF_SURCHI</footer>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        function sendData() {
            const data = {url: document.getElementById("url").value, plat: document.getElementById("platform").value};
            window.Telegram.WebApp.sendData(JSON.stringify(data));
        }
    </script>
</body>
</html>
